baseURL = "https://Tim-K36.github.io/"
languageCode = "en-us"
title = "TimK Labs"
theme = "plume"

[params]
  shortName = "TimK Labs"
  description = "Security research, coding, and offensive techniques"
  keywords = "security, coding, research, offensive security, CVE"
  author = "TimK"
  backgroundColor = "#000000"
  themeColor = "#ffffff"

  [params.socialLinks]
    github = "https://github.com/Tim-K36"

[menus]
  [[menus.main]]
    name = "Home"
    pageRef = "/"
    weight = 10
  [[menus.main]]
    name = "About"
    pageRef = "/about"
    weight = 20
  [[menus.main]]
    name = "Posts"
    pageRef = "/posts"
    weight = 30

[outputs]
  home = ["html", "rss", "webappmanifest", "json"]

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
  [markup.highlight]
    lineNos = true
    noClasses = false